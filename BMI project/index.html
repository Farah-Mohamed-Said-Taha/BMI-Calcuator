<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    
    <!-- Bootstrap 5 styling code -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="card">
            <h3 class="center mb">Body Mass Index Calculator (BMI)</h3>
            
            <form id="Form">
                <div class="mb">
                    <label class="label dir">weight (kg) :</label>
                    <input type="number" id="weight" class="style dir" placeholder="Enter your weight" required step="any">
                </div>
                
                <div class="mb">
                    <label class="label dir">height (cm) :</label>
                    <input type="number" id="height" class="style dir" placeholder="Enter your height" required step="any">
                </div>
                
                <button type="submit" class="btn"> Calculate Result </button>
            </form>

            <!--Result Box-->
            <div id="resultBox" class="alert"></div>
        </div>
    </div>

    <!-- JavaScript code -->
    <script src="main.js"></script>
</body>
</html>
